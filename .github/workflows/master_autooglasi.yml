name: Build and deploy ASP.Net Core app to Azure Web App - AutoOglasi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -o publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4AFB7C6F42D14DB39CCF173528ADF331 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_216035483F3643E4AF3C358532790784 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1CADA07DE2D245C2A7E379B552A04E21 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'AutoOglasi'
          package: publish
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4AFB7C6F42D14DB39CCF173528ADF331 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_216035483F3643E4AF3C358532790784 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1CADA07DE2D245C2A7E379B552A04E21 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'AutoOglasi'
          slot-name: 'Production'
          package: .
          
