name: Build and deploy ASP.NET Core app to Azure Web App - AutoOglasi

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PROJECT_PATH: Web/AutoOglasi.Web/AutoOglasi.Web.csproj
  PUBLISH_DIR: publish

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ${{ env.PUBLISH_DIR }} --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_54FEC83E422345928EE03446F88AE022 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FA9151E2B32545EFAA5CB56D94F8DCBF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F21B9EDF0A234CB4A26043D1BF461B5B }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: AutoOglasi
          slot-name: Production
          package: publish
